<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Wheather App</title>
</head>
<body>
   

    

<div class="card">
    <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false">
        <button><img src="search_3856329.png" alt="search"></button>
    </div>
    <div class="weather">
        <img src="weather-icon.webp" class="weather-icon">
        <h1 class="temp">22°C</h1>
        <h2 class="city">London</h2>
        <div class="details">
            <div class="col">
                <img src="weather_14407522.png">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="snowy_7774348.png">
                <div>
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="jawa.js"></script>
    
</body>
</html>
